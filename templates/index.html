<!DOCTYPE html>
<html>
<head>
    <title>Sitemap Fixer</title>
</head>
<body>
    <h1>Sitemap Fixer</h1>

    <!-- Error Message Display -->
    {% if error %}
        <p style="color:red; background-color: #ffe6e6; padding: 10px; border: 1px solid red;">
            <strong>Error:</strong> {{ error }}
        </p>
    {% endif %}

    <form action="/generate" method="post">
        <label>Domain:</label><br>
        <input type="text" name="domain" placeholder="https://example.com" required><br><br>

        <label>Limit:</label><br>
        <input type="number" name="limit" value="200"><br><br>

        <label>
            <input type="checkbox" name="use_js"> Use JS Rendering
        </label><br>

        <label>
            <input type="checkbox" name="fix_canonical"> Fix Canonical URLs
        </label><br><br>

        <button type="submit">Generate Sitemap</button>
    </form>

    {% if files %}
    <hr>
    <h3>Generated {{ count }} URLs</h3>
    <ul>
        {% for file in files %}
            <li>
                <!-- Updated to use the filename from the path for the download route -->
                <a href="/download/{{ file.split('/')[-1] if '/' in file else file.split('\\')[-1] }}" target="_blank">
                    Download {{ file.split('/')[-1] if '/' in file else file.split('\\')[-1] }}
                </a>
            </li>
        {% endfor %}
    </ul>
    {% endif %}

</body>
</html>
